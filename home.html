<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Dashboard</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Animate.css -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
body {
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    min-height: 100vh;
    color: white;
}
.card {
    border-radius: 15px;
}
.preview-img {
    height: 180px;
    object-fit: cover;
}
</style>
</head>

<body>

<div class="container py-5">

    <h1 class="text-center mb-4 animate__animated animate__fadeInDown">
        Home Dashboard
    </h1>

    <!-- Form Card -->
    <div class="card shadow-lg p-4 mb-5 animate__animated animate__fadeInUp">
        <h4 class="mb-3 text-dark">Add / Update Home</h4>

        <input type="text" id="title" class="form-control mb-3" placeholder="Title">

        <textarea id="content" class="form-control mb-3" placeholder="Content"></textarea>

        <input type="file" id="image" class="form-control mb-3">

        <button id="submitBtn" class="btn btn-primary w-100" onclick="handleSubmit()">
            Add
        </button>
    </div>

    <!-- Cards -->
    <div class="row" id="homeList"></div>

</div>

<script>

const API = "http://localhost:3000/home";
const homeList = document.getElementById("homeList");
let currentEditId = null;

/* ================= GET ================= */
async function getHomes() {
    const res = await fetch(API);
    const data = await res.json();

    homeList.innerHTML = "";

    data.forEach(home => {
        homeList.innerHTML += `
            <div class="col-md-4 mb-4 animate__animated animate__fadeIn">
                <div class="card shadow">
                    ${
                        home.image
                        ? `<img src="http://localhost:3000/uploads/${home.image}" class="card-img-top preview-img">`
                        : ""
                    }
                    <div class="card-body">
                        <h5 class="card-title">${home.title}</h5>
                        <p class="card-text">${home.content}</p>

                        <button class="btn btn-warning btn-sm me-2"
                            onclick="editHome('${home._id}', \`${home.title}\`, \`${home.content}\`)">
                            Edit
                        </button>

                        <button class="btn btn-danger btn-sm"
                            onclick="deleteHome('${home._id}')">
                            Delete
                        </button>
                    </div>
                </div>
            </div>
        `;
    });
}

getHomes();

/* ================= ADD ================= */
async function addHome() {
    const formData = new FormData();
    formData.append("title", title.value);
    formData.append("content", content.value);
    if(image.files[0]){
        formData.append("image", image.files[0]);
    }

    await fetch(API, {
        method: "POST",
        body: formData
    });

    resetForm();
    getHomes();
}

/* ================= DELETE ================= */
async function deleteHome(id) {
    if(!confirm("Are you sure?")) return;

    await fetch(`${API}/${id}`, {
        method: "DELETE"
    });

    getHomes();
}

/* ================= EDIT ================= */
function editHome(id, titleText, contentText) {
    title.value = titleText;
    content.value = contentText;
    currentEditId = id;
    submitBtn.innerText = "Update";
    window.scrollTo({top:0, behavior:'smooth'});
}

/* ================= UPDATE ================= */
async function updateHome() {
    const formData = new FormData();
    formData.append("title", title.value);
    formData.append("content", content.value);
    if(image.files[0]){
        formData.append("image", image.files[0]);
    }

    await fetch(`${API}/${currentEditId}`, {
        method: "PUT",
        body: formData
    });

    resetForm();
    getHomes();
}

/* ================= HANDLE ================= */
function handleSubmit(){
    if(currentEditId){
        updateHome();
    }else{
        addHome();
    }
}

/* ================= RESET ================= */
function resetForm(){
    title.value = "";
    content.value = "";
    image.value = "";
    currentEditId = null;
    submitBtn.innerText = "Add";
}

</script>

</body>
</html>
